<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}">Ventas</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>
<body class="container mt-4">

<h2 th:text="${title}">Ventas</h2>

<a class="btn btn-primary mb-3" th:href="@{/ventas/nueva}">Nueva venta</a>

<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Fecha</th>
        <th>Cliente</th>
        <th>Total</th>
        <th>Estado</th>
        <th colspan="3">Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="venta : ${ventas}">
        <td th:text="${venta.id}"></td>
        <td th:text="${venta.fecha}"></td>
        <td th:text="${venta.cliente.nombre}"></td>
        <td th:text="${venta.totalVenta}"></td>
        <td>
            <span th:if="${venta.procesado == 0}" class="badge bg-warning">Nueva</span>
            <span th:if="${venta.procesado == 1}" class="badge bg-success">Procesada</span>
        </td>
        <td>
            <a class="btn btn-sm btn-info"
               th:href="@{/ventas/ver/{id}(id=${venta.id})}">
                Ver
            </a>
        </td>
        <td>
            <a class="btn btn-sm btn-success"
               th:if="${venta.procesado == 0}"
               th:href="@{/ventas/procesar/{id}(id=${venta.id})}">
                Procesar
            </a>
        </td>
        <td>
            <a class="btn btn-sm btn-danger"
               th:if="${venta.procesado == 0}"
               th:href="@{/ventas/eliminar/{id}(id=${venta.id})}">
                Eliminar
            </a>
        </td>
    </tr>
    </tbody>
</table>

<a class="btn btn-secondary" th:href="@{/}">Volver</a>

</body>
</html>

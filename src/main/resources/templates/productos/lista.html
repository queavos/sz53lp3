<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}">Productos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>
<body class="container mt-4">

    <h2 class="mb-3" th:text="${title}">Listado de Productos</h2>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Id</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Estado</th>
                <th colspan="2">
                    <a class="btn btn-outline-primary" href="/productos/nuevo">Nuevo</a>
                </th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="prod : ${productos}">
                <td th:text="${prod.id}"></td>
                <td th:text="${prod.nombre}"></td>
                <td th:text="${prod.categoria != null ? prod.categoria.nombre : 'Sin categoría'}"></td>
                <td th:text="${prod.precio}"></td>
                <td th:text="${prod.estado ? 'Activo' : 'Inactivo'}"></td>

                <td>
                    <a class="btn btn-outline-warning"
                       th:href="@{/productos/editar/{id}(id=${prod.id})}">
                        Editar
                    </a>
                </td>

                <td>
                    <a class="btn btn-outline-danger"
                       th:href="@{/productos/eliminar/{id}(id=${prod.id})}">
                        Borrar
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

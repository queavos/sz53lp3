<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title th:text="${title}"></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    </head>
    <body>
        <h2 th:text="${title}"></h2>
        <form th:action="${modoedicion}? @{/categorias/actualizar} : @{/categorias/guardar}" th:object="${categoria}" method="post">
            <input class="form-control" type="hidden" th:field="*{id}" > </input><br>
            <input class="form-control" type="text" th:field="*{nombre}"> </input><br>
            <a class="btn btn-outline-secondary" href="/categorias/">Volver</a>
            <button class="btn btn-outline-primary" type="submit">enviar</button>
        </form>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    </body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}">Notas</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${title}">Notas de Envío</h2>
        <a class="btn btn-primary" th:href="@{/notas/nueva}">Nueva nota</a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Id</th>
                <th>Fecha</th>
                <th>Proveedor</th>
                <th>Estado</th>
                <th>Detalles</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="nota : ${notas}">
                <td th:text="${nota.id}"></td>
                <td th:text="${nota.fecha}"></td>
                <td th:text="${nota.proveedor}"></td>
                <td th:text="${nota.estadoTexto}"></td>
                <td th:text="${#lists.size(nota.detalles)}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary"
                       th:href="@{/notas/ver/{id}(id=${nota.id})}">
                        Ver
                    </a>

                    <a class="btn btn-sm btn-outline-danger"
                       th:if="${nota.editable}"
                       th:href="@{/notas/eliminar/{id}(id=${nota.id})}">
                        Eliminar
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
